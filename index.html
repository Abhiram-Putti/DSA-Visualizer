<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Visualizer — Interactive Algorithm & Data Structure Playground</title>
<meta name="description" content="A modern, interactive Data Structures & Algorithms visualizer covering sorting, searching, arrays, linked lists, stacks, queues, trees, graphs, dynamic programming, and recursion — built with vanilla HTML, CSS, and JavaScript.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- Splash / loading screen -->
<div class="splash" id="splash">
  <div class="spinner" aria-hidden="true"></div>
  <div class="brand-mark">BOOTING DSA_VISUALIZER…</div>
</div>

<div class="app-shell">

  <!-- Topbar -->
  <header class="topbar">
    <button class="btn btn-icon btn-ghost menu-toggle" id="menuToggle" aria-label="Toggle navigation menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="brand">
      <span class="dot-rail"><span></span><span></span><span></span></span>
      DSA Visualizer
    </div>
    <div class="topbar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="topSearch" placeholder="Search algorithms & structures…  (press /)" aria-label="Search algorithms">
    </div>
    <div class="topbar-actions">
      <button class="btn btn-icon btn-ghost" id="fullscreenBtn" title="Fullscreen visualization" aria-label="Fullscreen visualization">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
      <div class="switch" id="themeSwitch" title="Toggle dark / light theme" role="button" aria-label="Toggle theme"><div class="knob"></div></div>
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="Primary navigation"></nav>
  <div class="sidebar-scrim" id="sidebarScrim"></div>

  <!-- Main content -->
  <main class="main" id="main">
    <section class="view active" id="view-home"></section>
  </main>

</div>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>

<!-- Core utilities (order matters: utils/workspace before modules, modules before main) -->
<script src="js/utils.js"></script>
<script src="js/workspace.js"></script>

<!-- Algorithm & data-structure modules -->
<script src="js/sorting.js"></script>
<script src="js/searching.js"></script>
<script src="js/array.js" ></script>
<script src="js/recursion.js"></script>
<script src="js/linkedlist.js"></script>
<script src="js/stack.js"></script>
<script src="js/queue.js"></script>
<script src="js/tree.js"></script>
<script src="js/graph.js"></script>
<script src="js/dp.js"></script>

<!-- App shell (sidebar, routing, theme, shortcuts) -->
<script src="js/main.js"></script>
</body>
</html>
